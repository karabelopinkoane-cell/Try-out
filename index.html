<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drip Apparel</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login Page -->
  <section id="login-page" class="full-screen">
    <div class="login-container">
      <h2>Drip Apparel</h2>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <p><a href="#" onclick="alert('Reset link sent to email (mock).')">Forgot Password?</a></p>
    </div>
  </section>

  <!-- Category Page -->
  <section id="category-page" class="hidden">
    <h2>Select Category</h2>
    <div class="category-buttons">
      <button onclick="loadCatalogue('men')">Men</button>
      <button onclick="loadCatalogue('women')">Women</button>
    </div>
    <button onclick="logout()">Logout</button>
  </section>

  <!-- Catalogue Page -->
  <section id="catalogue-page" class="hidden">
    <h2 id="catalogue-title"></h2>
    <div class="product-grid" id="product-grid"></div>
    <button onclick="goBack()">Back</button>
    <button onclick="viewCart()">View Cart</button>
  </section>

  <!-- Cart Page -->
  <section id="cart-page" class="hidden">
    <h2>Your Cart</h2>
    <ul id="cart-list"></ul>
    <p>Total: R<span id="total">0</span></p>
    <button onclick="checkout()">Checkout</button>
    <button onclick="clearCart()">Clear Cart</button>
    <button onclick="goBackToCatalogue()">Back to Catalogue</button>
  </section>

  <!-- Payment Page -->
  <section id="payment-page" class="hidden">
    <h2>Payment Details</h2>
    <input type="text" id="card-name" placeholder="Name on Card" />
    <input type="text" id="card-number" placeholder="Card Number" maxlength="16" />
    <input type="text" id="cvv" placeholder="CVV" maxlength="3" />
    <button onclick="confirmPayment()">Pay R<span id="pay-amount">0</span></button>
  </section>

  <script src="script.js"></script>
</body>
</html>
